name: Deploy public UI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p _site/static
          cp static/index.html _site/index.html
          cp static/styles.css _site/static/styles.css
          cp static/app.js _site/static/app.js
          cp static/excel-import.js _site/static/excel-import.js
          cat > _site/static/config.js <<EOF
          window.APP_CONFIG = {
            apiBase: ""
          };
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
